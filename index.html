  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"aae484f9-03a1-4150-bd63-2df782b82c77\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n\n<style>\nhtml{scroll-behavior:smooth}\ninput::placeholder,textarea::placeholder{color:rgba(245,245,247,.38)}\nbody{margin:0;background:#050507;font-family:-apple-system,BlinkMacSystemFont,\"Helvetica Neue\",Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}\n@keyframes syq-bar{0%,100%{transform:scaleY(.25)}50%{transform:scaleY(1)}}\n@keyframes syq-pulse{0%,100%{opacity:.45}50%{opacity:1}}\n\n::selection{background:rgba(45,212,200,.35)}\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<!-- ══════════ NAV ══════════ -->\n<nav style=\"position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:center;gap:44px;height:52px;background:rgba(8,9,12,.72);backdrop-filter:saturate(1.8) blur(20px);-webkit-backdrop-filter:saturate(1.8) blur(20px);border-bottom:1px solid rgba(255,255,255,.06)\">\n  <a href=\"#top\" style=\"display:flex;align-items:center;gap:8px;text-decoration:none\">\n    <img src=\"3b6f0ca9-2b2c-4f09-8b93-222088d058e4\" alt=\"SYNIQ logo\" style=\"width:72px;height:58px;margin:-17px -14px;flex:none;object-fit:contain\">\n    <span style=\"font-size:15px;font-weight:700;letter-spacing:.14em;color:#f5f5f7\">SYNIQ<\u002Fspan>\n  <\u002Fa>\n  <a href=\"#voice\" style=\"font-size:12.5px;color:rgba(245,245,247,.8);text-decoration:none\" style-hover=\"color:#fff\">Voice AI<\u002Fa>\n  <a href=\"#revenue\" style=\"font-size:12.5px;color:rgba(245,245,247,.8);text-decoration:none\" style-hover=\"color:#fff\">Lost revenue<\u002Fa>\n  <a href=\"#automations\" style=\"font-size:12.5px;color:rgba(245,245,247,.8);text-decoration:none\" style-hover=\"color:#fff\">Automations<\u002Fa>\n  <a href=\"#industries\" style=\"font-size:12.5px;color:rgba(245,245,247,.8);text-decoration:none\" style-hover=\"color:#fff\">Industries<\u002Fa>\n  <a href=\"#how\" style=\"font-size:12.5px;color:rgba(245,245,247,.8);text-decoration:none\" style-hover=\"color:#fff\">How it works<\u002Fa>\n  <a href=\"#contact\" style=\"font-size:12.5px;color:var(--acc,#2ED3C6);text-decoration:none;font-weight:600\" style-hover=\"color:color-mix(in srgb, var(--acc,#2ED3C6) 66%, #fff)\">Book a call<\u002Fa>\n<\u002Fnav>\n\n<!-- ══════════ HERO ══════════ -->\n<section id=\"top\" data-screen-label=\"Hero\" style=\"position:relative;overflow:hidden;display:flex;flex-direction:column;align-items:center;text-align:center;padding:110px 24px 130px;background:radial-gradient(1200px 600px at 50% -10%, rgba(30,42,120,calc(.55*var(--glowm,1))), transparent 70%), #050507\">\n  <div style=\"font-size:15px;font-weight:600;letter-spacing:.24em;color:var(--acc,#2ED3C6);text-transform:uppercase\">Syniq Voice AI<\u002Fdiv>\n  <h1 style=\"margin:18px 0 0;font-size:clamp(56px,8vw,112px);line-height:.98;font-weight:800;letter-spacing:-.03em;color:#f5f5f7;text-wrap:balance\">Your front desk.<br>Never off the clock.<\u002Fh1>\n  <p style=\"margin:26px auto 0;max-width:640px;font-size:21px;line-height:1.45;color:rgba(245,245,247,.72);text-wrap:pretty\">AI voice agents and automations that answer every call, book every appointment, and follow up with every client — so your team can focus on the ones in the room.<\u002Fp>\n  <div style=\"display:flex;gap:16px;margin-top:36px\">\n    <a href=\"#contact\" style=\"display:inline-flex;align-items:center;height:48px;padding:0 28px;border-radius:24px;background:var(--acc,#2ED3C6);color:#04211e;font-size:16px;font-weight:600;text-decoration:none\" style-hover=\"background:color-mix(in srgb, var(--acc,#2ED3C6) 80%, #fff)\">Book a demo<\u002Fa>\n    <a href=\"#voice\" style=\"display:inline-flex;align-items:center;height:48px;padding:0 28px;border-radius:24px;border:1px solid var(--acc,#2ED3C6);color:var(--acc,#2ED3C6);font-size:16px;font-weight:600;text-decoration:none\" style-hover=\"background:color-mix(in srgb, var(--acc,#2ED3C6) 12%, transparent)\">Hear it in action<\u002Fa>\n  <\u002Fdiv>\n\n  <!-- live call card -->\n  <sc-if value=\"{{ showLiveCall }}\" hint-placeholder-val=\"{{ true }}\">\n  <div style=\"margin-top:80px;width:min(560px,92vw);border-radius:24px;background:rgba(18,20,28,.85);border:1px solid rgba(255,255,255,.08);box-shadow:0 40px 90px rgba(0,0,0,.6), 0 0 120px color-mix(in srgb, var(--acc,#2ED3C6) 8%, transparent);padding:28px 32px\">\n    <div style=\"display:flex;align-items:center;gap:12px\">\n      <span style=\"width:9px;height:9px;border-radius:50%;background:var(--acc,#2ED3C6);animation:syq-pulse 1.6s ease-in-out infinite\"><\u002Fspan>\n      <span style=\"font-size:12px;font-weight:600;letter-spacing:.16em;color:var(--acc,#2ED3C6);text-transform:uppercase\">Live call · Radiance Med Spa<\u002Fspan>\n      <span style=\"margin-left:auto;font-size:12px;color:rgba(245,245,247,.45);font-variant-numeric:tabular-nums\">{{ callTimer }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"display:flex;align-items:center;justify-content:center;gap:5px;height:64px;margin:22px 0 18px\">{{ waveform }}<\u002Fdiv>\n    <div style=\"font-size:16px;line-height:1.5;color:rgba(245,245,247,.85);text-align:left\">“Of course — Dr. Patel has an opening Thursday at 2:15. Should I book your HydraFacial then and text you a confirmation?”<\u002Fdiv>\n    <div style=\"display:flex;gap:8px;margin-top:18px\">\n      <span style=\"font-size:11.5px;font-weight:600;color:color-mix(in srgb, var(--acc,#2ED3C6) 58%, #fff);background:color-mix(in srgb, var(--acc,#2ED3C6) 12%, transparent);border:1px solid color-mix(in srgb, var(--acc,#2ED3C6) 25%, transparent);border-radius:999px;padding:5px 12px\">Appointment booked<\u002Fspan>\n      <span style=\"font-size:11.5px;font-weight:600;color:color-mix(in srgb, var(--acc,#2ED3C6) 58%, #fff);background:color-mix(in srgb, var(--acc,#2ED3C6) 12%, transparent);border:1px solid color-mix(in srgb, var(--acc,#2ED3C6) 25%, transparent);border-radius:999px;padding:5px 12px\">SMS confirmation sent<\u002Fspan>\n      <span style=\"font-size:11.5px;font-weight:600;color:color-mix(in srgb, var(--acc,#2ED3C6) 58%, #fff);background:color-mix(in srgb, var(--acc,#2ED3C6) 12%, transparent);border:1px solid color-mix(in srgb, var(--acc,#2ED3C6) 25%, transparent);border-radius:999px;padding:5px 12px\">CRM updated<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fsection>\n\n<!-- ══════════ VOICE AI ══════════ -->\n<section id=\"voice\" data-screen-label=\"Voice AI\" style=\"background:#0A0C14;border-top:1px solid rgba(255,255,255,.05);padding:120px 24px;text-align:center\">\n  <div style=\"font-size:14px;font-weight:600;letter-spacing:.24em;color:var(--acc,#2ED3C6);text-transform:uppercase\">Voice Agents<\u002Fdiv>\n  <h2 style=\"margin:16px auto 0;max-width:800px;font-size:clamp(40px,5.5vw,72px);line-height:1.03;font-weight:800;letter-spacing:-.025em;color:#f5f5f7;text-wrap:balance\">Answers like your best receptionist. On every line, at once.<\u002Fh2>\n  <p style=\"margin:24px auto 0;max-width:620px;font-size:19px;line-height:1.5;color:rgba(245,245,247,.7);text-wrap:pretty\">Natural, on-brand conversations that book, reschedule, answer FAQs, and route the calls that truly need a human — 24/7, in any volume.<\u002Fp>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px;max-width:1080px;margin:64px auto 0\">\n    <sc-for list=\"{{ voiceFeatures }}\" as=\"f\" hint-placeholder-count=\"3\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:34px 30px;text-align:left\" style-hover=\"border-color:color-mix(in srgb, var(--acc,#2ED3C6) 40%, transparent);background:color-mix(in srgb, var(--acc,#2ED3C6) 5%, transparent)\">\n        <div style=\"font-size:30px;font-weight:800;color:var(--acc,#2ED3C6);letter-spacing:-.02em\">{{ f.stat }}<\u002Fdiv>\n        <div style=\"margin-top:12px;font-size:17px;font-weight:700;color:#f5f5f7\">{{ f.title }}<\u002Fdiv>\n        <div style=\"margin-top:8px;font-size:14.5px;line-height:1.55;color:rgba(245,245,247,.62)\">{{ f.body }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ LOST REVENUE / ROI ══════════ -->\n<section id=\"revenue\" data-screen-label=\"Lost revenue\" style=\"background:radial-gradient(1000px 550px at 50% 0%, rgba(30,42,120,calc(.45*var(--glowm,1))), transparent 70%), #050507;border-top:1px solid rgba(255,255,255,.05);padding:120px 24px;text-align:center\">\n  <div style=\"font-size:14px;font-weight:600;letter-spacing:.24em;color:var(--acc,#2ED3C6);text-transform:uppercase\">The cost of a missed call<\u002Fdiv>\n  <h2 style=\"margin:16px auto 0;max-width:820px;font-size:clamp(40px,5.5vw,72px);line-height:1.02;font-weight:800;letter-spacing:-.025em;color:#f5f5f7;text-wrap:balance\">Every unanswered ring is revenue walking out the door.<\u002Fh2>\n  <p style=\"margin:24px auto 0;max-width:640px;font-size:19px;line-height:1.5;color:rgba(245,245,247,.7);text-wrap:pretty\">Practices miss up to 35% of their calls — most during business hours, while staff are with clients. A voice agent answers every one.<\u002Fp>\n\n  <!-- headline stats -->\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;max-width:1000px;margin:64px auto 0\">\n    <sc-for list=\"{{ lossStats }}\" as=\"ls\" hint-placeholder-count=\"3\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:34px 26px\">\n        <div style=\"font-size:38px;font-weight:800;letter-spacing:-.02em;color:var(--acc,#2ED3C6)\">{{ ls.stat }}<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:14.5px;line-height:1.5;color:rgba(245,245,247,.65)\">{{ ls.body }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n\n  <!-- calculator -->\n  <div style=\"max-width:880px;margin:72px auto 0;background:rgba(18,20,28,.85);border:1px solid rgba(255,255,255,.09);border-radius:28px;padding:48px 48px 42px;box-shadow:0 40px 90px rgba(0,0,0,.5), 0 0 120px color-mix(in srgb, var(--acc,#2ED3C6) 6%, transparent);text-align:left\">\n    <div style=\"display:flex;align-items:baseline;justify-content:space-between;gap:16px;flex-wrap:wrap\">\n      <div>\n        <div style=\"font-size:22px;font-weight:800;color:#f5f5f7;letter-spacing:-.01em\">What are missed calls costing you?<\u002Fdiv>\n        <div style=\"margin-top:6px;font-size:14px;color:rgba(245,245,247,.55)\">Conservative math — per-visit values and conversion rates from industry data.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:8px\">\n        <button onclick=\"{{ pickDental }}\" style=\"{{ dentalBtnStyle }}\">Dental<\u002Fbutton>\n        <button onclick=\"{{ pickMedspa }}\" style=\"{{ medspaBtnStyle }}\">Med Spa<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"margin-top:36px\">\n      <div style=\"display:flex;justify-content:space-between;align-items:baseline\">\n        <label style=\"font-size:15px;font-weight:600;color:rgba(245,245,247,.85)\">Missed calls per week<\u002Flabel>\n        <span style=\"font-size:26px;font-weight:800;color:var(--acc,#2ED3C6);font-variant-numeric:tabular-nums\">{{ missedCalls }}<\u002Fspan>\n      <\u002Fdiv>\n      <input type=\"range\" min=\"5\" max=\"105\" step=\"5\" value=\"{{ missedCalls }}\" onchange=\"{{ onCalls }}\" style=\"width:100%;margin-top:14px;accent-color:var(--acc,#2ED3C6);height:4px;cursor:pointer\">\n      <div style=\"display:flex;justify-content:space-between;font-size:12px;color:rgba(245,245,247,.4);margin-top:6px\"><span>5<\u002Fspan><span>The average practice misses ~105/week<\u002Fspan><span>105<\u002Fspan><\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px;margin-top:36px\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:24px\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:rgba(245,245,247,.5)\">Value per booked call<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:30px;font-weight:800;color:#f5f5f7;font-variant-numeric:tabular-nums\">{{ perCall }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:color-mix(in srgb, var(--acc,#2ED3C6) 8%, transparent);border:1px solid color-mix(in srgb, var(--acc,#2ED3C6) 30%, transparent);border-radius:18px;padding:24px\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:color-mix(in srgb, var(--acc,#2ED3C6) 58%, #fff)\">Lost per month<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:30px;font-weight:800;color:var(--acc,#2ED3C6);font-variant-numeric:tabular-nums\">{{ lostMonth }}<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background:color-mix(in srgb, var(--acc,#2ED3C6) 8%, transparent);border:1px solid color-mix(in srgb, var(--acc,#2ED3C6) 30%, transparent);border-radius:18px;padding:24px\">\n        <div style=\"font-size:12px;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:color-mix(in srgb, var(--acc,#2ED3C6) 58%, #fff)\">Lost per year<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:30px;font-weight:800;color:var(--acc,#2ED3C6);font-variant-numeric:tabular-nums\">{{ lostYear }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;align-items:center;justify-content:space-between;gap:20px;flex-wrap:wrap;margin-top:32px;padding-top:28px;border-top:1px solid rgba(255,255,255,.08)\">\n      <div style=\"font-size:15.5px;line-height:1.5;color:rgba(245,245,247,.75);max-width:480px;text-wrap:pretty\">A Syniq voice agent answers 100% of these calls for a fraction of that — <strong style=\"color:#f5f5f7;font-weight:700\">{{ recoveryLine }}<\u002Fstrong><\u002Fdiv>\n      <a href=\"#contact\" style=\"display:inline-flex;align-items:center;height:46px;padding:0 26px;border-radius:23px;background:var(--acc,#2ED3C6);color:#04211e;font-size:15.5px;font-weight:600;text-decoration:none;flex:none\" style-hover=\"background:color-mix(in srgb, var(--acc,#2ED3C6) 80%, #fff)\">Recover this revenue<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"margin-top:18px;font-size:11.5px;line-height:1.5;color:rgba(245,245,247,.35)\">{{ assumptionsNote }}<\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ AUTOMATIONS ══════════ -->\n<section id=\"automations\" data-screen-label=\"Automations\" style=\"background:#050507;border-top:1px solid rgba(255,255,255,.05);padding:120px 24px\">\n  <div style=\"max-width:1080px;margin:0 auto;display:grid;grid-template-columns:1.05fr 1fr;gap:72px;align-items:center\">\n    <div>\n      <div style=\"font-size:14px;font-weight:600;letter-spacing:.24em;color:var(--acc,#2ED3C6);text-transform:uppercase\">Automations<\u002Fdiv>\n      <h2 style=\"margin:16px 0 0;font-size:clamp(36px,4.5vw,58px);line-height:1.05;font-weight:800;letter-spacing:-.025em;color:#f5f5f7;text-wrap:balance\">The busywork, handled before you notice it.<\u002Fh2>\n      <p style=\"margin:22px 0 0;font-size:18px;line-height:1.55;color:rgba(245,245,247,.7);text-wrap:pretty\">Reminders, reviews, recalls, and follow-ups run themselves. Syniq connects to the tools you already use and keeps every client moving — no new software to learn.<\u002Fp>\n      <a href=\"#contact\" style=\"display:inline-flex;align-items:center;margin-top:28px;font-size:17px;font-weight:600;color:var(--acc,#2ED3C6);text-decoration:none\" style-hover=\"color:color-mix(in srgb, var(--acc,#2ED3C6) 66%, #fff)\">See what we'd automate for you →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:flex;flex-direction:column;gap:14px\">\n      <sc-for list=\"{{ automations }}\" as=\"a\" hint-placeholder-count=\"4\">\n        <div style=\"display:flex;align-items:center;gap:16px;background:rgba(18,20,28,.85);border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:18px 22px\" style-hover=\"border-color:color-mix(in srgb, var(--acc,#2ED3C6) 40%, transparent)\">\n          <span style=\"width:10px;height:10px;border-radius:50%;background:var(--acc,#2ED3C6);flex:none\"><\u002Fspan>\n          <div style=\"flex:1\">\n            <div style=\"font-size:15.5px;font-weight:700;color:#f5f5f7\">{{ a.title }}<\u002Fdiv>\n            <div style=\"font-size:13px;color:rgba(245,245,247,.55);margin-top:3px\">{{ a.body }}<\u002Fdiv>\n          <\u002Fdiv>\n          <span style=\"font-size:11px;font-weight:700;letter-spacing:.08em;color:color-mix(in srgb, var(--acc,#2ED3C6) 58%, #fff);text-transform:uppercase\">{{ a.tag }}<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ INDUSTRIES ══════════ -->\n<section id=\"industries\" data-screen-label=\"Industries\" style=\"background:#0A0C14;border-top:1px solid rgba(255,255,255,.05);padding:120px 24px;text-align:center\">\n  <div style=\"font-size:14px;font-weight:600;letter-spacing:.24em;color:var(--acc,#2ED3C6);text-transform:uppercase\">Built for service businesses<\u002Fdiv>\n  <h2 style=\"margin:16px auto 0;max-width:760px;font-size:clamp(36px,5vw,64px);line-height:1.05;font-weight:800;letter-spacing:-.025em;color:#f5f5f7;text-wrap:balance\">If your phone rings, Syniq works for you.<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;max-width:1080px;margin:60px auto 0\">\n    <sc-for list=\"{{ industries }}\" as=\"ind\" hint-placeholder-count=\"4\">\n      <div style=\"background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:20px;padding:36px 24px\" style-hover=\"border-color:color-mix(in srgb, var(--acc,#2ED3C6) 40%, transparent);background:color-mix(in srgb, var(--acc,#2ED3C6) 5%, transparent)\">\n        <div style=\"font-size:18px;font-weight:700;color:#f5f5f7\">{{ ind.name }}<\u002Fdiv>\n        <div style=\"margin-top:8px;font-size:13.5px;line-height:1.5;color:rgba(245,245,247,.6)\">{{ ind.body }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ HOW IT WORKS ══════════ -->\n<section id=\"how\" data-screen-label=\"How it works\" style=\"background:#050507;border-top:1px solid rgba(255,255,255,.05);padding:120px 24px;text-align:center\">\n  <div style=\"font-size:14px;font-weight:600;letter-spacing:.24em;color:var(--acc,#2ED3C6);text-transform:uppercase\">How it works<\u002Fdiv>\n  <h2 style=\"margin:16px auto 0;max-width:700px;font-size:clamp(36px,5vw,64px);line-height:1.05;font-weight:800;letter-spacing:-.025em;color:#f5f5f7\">Live in weeks. Not quarters.<\u002Fh2>\n  <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;max-width:1000px;margin:64px auto 0\">\n    <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"3\">\n      <div style=\"text-align:left;background:rgba(18,20,28,.6);border:1px solid rgba(255,255,255,.07);border-radius:22px;padding:32px 28px\">\n        <div style=\"font-size:13px;font-weight:800;letter-spacing:.18em;color:var(--acc,#2ED3C6)\">{{ s.num }}<\u002Fdiv>\n        <div style=\"margin-top:14px;font-size:19px;font-weight:700;color:#f5f5f7\">{{ s.title }}<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:14.5px;line-height:1.55;color:rgba(245,245,247,.62)\">{{ s.body }}<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-for>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ══════════ CTA ══════════ -->\n<section id=\"contact\" data-screen-label=\"CTA\" style=\"background:#10163A;border-top:1px solid rgba(255,255,255,.05);padding:130px 24px;text-align:center\">\n  <h2 style=\"margin:0 auto;max-width:720px;font-size:clamp(40px,5.5vw,72px);line-height:1.02;font-weight:800;letter-spacing:-.025em;color:#f5f5f7\">Stop missing revenue on hold.<\u002Fh2>\n  <p style=\"margin:22px auto 0;max-width:520px;font-size:19px;line-height:1.5;color:rgba(245,245,247,.72);text-wrap:pretty\">Tell us about your practice — we'll reply within one business day with a free 20-minute call audit.<\u002Fp>\n\n  <sc-if value=\"{{ formNotDone }}\" hint-placeholder-val=\"{{ true }}\">\n  <form onsubmit=\"{{ onFormSubmit }}\" style=\"max-width:560px;margin:44px auto 0;display:grid;grid-template-columns:1fr 1fr;gap:14px;text-align:left\">\n    <input type=\"text\" name=\"name\" placeholder=\"Your name\" required=\"{{ true }}\" style=\"box-sizing:border-box;width:100%;height:50px;padding:0 18px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#f5f5f7;font-size:15px;font-family:inherit;outline:none\" style-focus=\"border-color:var(--acc,#2ED3C6)\">\n    <input type=\"text\" name=\"business\" placeholder=\"Business name\" required=\"{{ true }}\" style=\"box-sizing:border-box;width:100%;height:50px;padding:0 18px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#f5f5f7;font-size:15px;font-family:inherit;outline:none\" style-focus=\"border-color:var(--acc,#2ED3C6)\">\n    <input type=\"email\" name=\"email\" placeholder=\"Email\" required=\"{{ true }}\" style=\"box-sizing:border-box;width:100%;height:50px;padding:0 18px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#f5f5f7;font-size:15px;font-family:inherit;outline:none\" style-focus=\"border-color:var(--acc,#2ED3C6)\">\n    <input type=\"tel\" name=\"phone\" placeholder=\"Phone\" style=\"box-sizing:border-box;width:100%;height:50px;padding:0 18px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#f5f5f7;font-size:15px;font-family:inherit;outline:none\" style-focus=\"border-color:var(--acc,#2ED3C6)\">\n    <textarea name=\"message\" placeholder=\"What would you like help with? (missed calls, reminders, follow-ups…)\" rows=\"4\" style=\"grid-column:1 / -1;box-sizing:border-box;width:100%;padding:14px 18px;border-radius:14px;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);color:#f5f5f7;font-size:15px;font-family:inherit;line-height:1.5;resize:vertical;outline:none\" style-focus=\"border-color:var(--acc,#2ED3C6)\"><\u002Ftextarea>\n    <button type=\"submit\" style=\"grid-column:1 / -1;height:52px;border-radius:26px;background:var(--acc,#2ED3C6);color:#04211e;font-size:16.5px;font-weight:600;font-family:inherit;border:none;cursor:pointer\" style-hover=\"background:color-mix(in srgb, var(--acc,#2ED3C6) 80%, #fff)\">Send message<\u002Fbutton>\n    <div style=\"grid-column:1 / -1;font-size:12px;color:rgba(245,245,247,.4);text-align:center\">Prefer email? <a href=\"mailto:hello@syniq.ai\" style=\"color:var(--acc,#2ED3C6);text-decoration:none\">hello@syniq.ai<\u002Fa><\u002Fdiv>\n  <\u002Fform>\n  <\u002Fsc-if>\n\n  <sc-if value=\"{{ formDone }}\" hint-placeholder-val=\"{{ false }}\">\n  <div style=\"max-width:560px;margin:44px auto 0;background:color-mix(in srgb, var(--acc,#2ED3C6) 8%, transparent);border:1px solid color-mix(in srgb, var(--acc,#2ED3C6) 30%, transparent);border-radius:20px;padding:40px 32px\">\n    <div style=\"font-size:22px;font-weight:800;color:#f5f5f7\">Thanks — message received.<\u002Fdiv>\n    <div style=\"margin-top:10px;font-size:15.5px;line-height:1.5;color:rgba(245,245,247,.7)\">We'll get back to you within one business day to set up your free call audit.<\u002Fdiv>\n  <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fsection>\n\n<!-- ══════════ FOOTER ══════════ -->\n<footer style=\"background:#050507;border-top:1px solid rgba(255,255,255,.06);padding:44px 24px;display:flex;flex-direction:column;align-items:center;gap:12px\">\n  <div style=\"display:flex;align-items:center;gap:8px\">\n    <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"none\">\n      <circle cx=\"12\" cy=\"12\" r=\"10\" stroke=\"#2ED3C6\" stroke-width=\"2\"><\u002Fcircle>\n      <circle cx=\"12\" cy=\"12\" r=\"2.4\" fill=\"#2ED3C6\"><\u002Fcircle>\n    <\u002Fsvg>\n    <span style=\"font-size:13px;font-weight:700;letter-spacing:.14em;color:rgba(245,245,247,.85)\">SYNIQ<\u002Fspan>\n  <\u002Fdiv>\n  <div style=\"font-size:12px;color:rgba(245,245,247,.4)\">AI automations &amp; voice agents for service businesses · © 2026 Syniq AI Consulting<\u002Fdiv>\n<\u002Ffooter>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;accent&quot;: {&quot;editor&quot;: &quot;color&quot;, &quot;default&quot;: &quot;#2ED3C6&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;options&quot;: [&quot;#2ED3C6&quot;, &quot;#4FB8F0&quot;, &quot;#7C8AFF&quot;, &quot;#3FDE9C&quot;], &quot;section&quot;: &quot;Brand&quot;}, &quot;glow&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Brand&quot;}, &quot;showLiveCall&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Hero&quot;}, &quot;defaultIndustry&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;dental&quot;, &quot;options&quot;: [&quot;dental&quot;, &quot;medspa&quot;], &quot;tsType&quot;: &quot;'dental' | 'medspa'&quot;, &quot;section&quot;: &quot;Calculator&quot;}}\">\nclass Component extends DCLogic {\n  state = { seconds: 154, industry: (this.props && this.props.defaultIndustry) || 'dental', missedCalls: 25, sent: false };\n\n  _applyTheme() {\n    const st = document.documentElement.style;\n    st.setProperty('--acc', (this.props && this.props.accent) || '#2ED3C6');\n    st.setProperty('--glowm', (this.props && this.props.glow === false) ? '0' : '1');\n  }\n  componentDidMount() {\n    this._applyTheme();\n    this._t = setInterval(() => this.setState(s => ({ seconds: s.seconds + 1 })), 1000);\n  }\n  componentDidUpdate() { this._applyTheme(); }\n  componentWillUnmount() { clearInterval(this._t); }\n\n  renderVals() {\n    const m = Math.floor(this.state.seconds / 60);\n    const s = String(this.state.seconds % 60).padStart(2, '0');\n\n    const accent = (this.props && this.props.accent) || '#2ED3C6';\n    const heights = [18, 30, 44, 58, 40, 26, 50, 62, 46, 32, 20, 38, 54, 60, 42, 28, 18, 34, 48, 56, 36, 24];\n    const waveform = React.createElement('div',\n      { style: { display: 'flex', alignItems: 'center', gap: 5, height: 64 } },\n      heights.map((h, i) => React.createElement('span', {\n        key: i,\n        style: {\n          width: 5, height: h, borderRadius: 3, background: accent,\n          transformOrigin: 'center', animation: `syq-bar ${(0.9 + (i % 5) * 0.18).toFixed(2)}s ease-in-out ${(i * 0.07).toFixed(2)}s infinite`\n        }\n      }))\n    );\n\n    // ── ROI calculator (conservative industry figures) ──\n    const models = {\n      dental: { perCall: 850, conv: 0.30, label: 'dental' },   // $850 immediate value per new-patient call, ~30% would have booked\n      medspa: { perCall: 600, conv: 0.40, label: 'medspa' }    // $500–$700 avg visit, 30–50% inquiry-to-booking conversion\n    };\n    const mdl = models[this.state.industry];\n    const lostMo = this.state.missedCalls * 4.33 * mdl.conv * mdl.perCall;\n    const fmt = n => '$' + Math.round(n).toLocaleString('en-US');\n    const btn = on => ({\n      height: 38, padding: '0 20px', borderRadius: 19, cursor: 'pointer',\n      fontSize: 14, fontWeight: 600, fontFamily: 'inherit',\n      background: on ? accent : 'rgba(255,255,255,.06)',\n      color: on ? '#04211e' : 'rgba(245,245,247,.75)',\n      border: on ? '1px solid ' + accent : '1px solid rgba(255,255,255,.14)'\n    });\n\n    return {\n      callTimer: m + ':' + s,\n      waveform,\n      showLiveCall: !(this.props && this.props.showLiveCall === false),\n      formDone: this.state.sent,\n      formNotDone: !this.state.sent,\n      onFormSubmit: e => { e.preventDefault(); this.setState({ sent: true }); },\n      // calculator\n      missedCalls: this.state.missedCalls,\n      onCalls: e => this.setState({ missedCalls: Number(e.target.value) }),\n      pickDental: () => this.setState({ industry: 'dental' }),\n      pickMedspa: () => this.setState({ industry: 'medspa' }),\n      dentalBtnStyle: btn(this.state.industry === 'dental'),\n      medspaBtnStyle: btn(this.state.industry === 'medspa'),\n      perCall: fmt(mdl.perCall),\n      lostMonth: fmt(lostMo),\n      lostYear: fmt(lostMo * 12),\n      recoveryLine: 'one recovered week typically pays for the service.',\n      assumptionsNote: this.state.industry === 'dental'\n        ? 'Assumes $850 immediate value per missed new-patient call and 30% of missed calls would have booked. Industry baseline: practices miss ~35% of calls (~105/week) — $8K–$12K lost per month, $100K–$140K per year for a single-location practice.'\n        : 'Assumes $600 average visit value (industry range $500–$700) and 40% inquiry-to-booking conversion. Salons and med spas miss up to 35% of calls because staff physically can\\u2019t answer mid-service; med spa clients are worth $7,800+ in lifetime value.',\n      lossStats: [\n        { stat: '35%', body: 'of calls to service practices go unanswered — most during regular business hours, not after close.' },\n        { stat: '$850', body: 'immediate revenue lost with every missed new-patient call — up to $15,000 over the patient\\u2019s lifetime.' },\n        { stat: '$100K+', body: 'lost per year by the average single-location practice. A voice agent recovers it for a fraction of the cost.' }\n      ],\n      voiceFeatures: [\n        { stat: '24/7', title: 'Always answering', body: 'Nights, weekends, lunch rushes — every caller hears a warm voice, not a voicemail.' },\n        { stat: '<1s', title: 'Instant pickup', body: 'No hold music, no queue. Your agent answers on the first ring, every time.' },\n        { stat: '100%', title: 'On-script, on-brand', body: 'Trained on your services, pricing, and tone. It says exactly what you would.' }\n      ],\n      automations: [\n        { title: 'Appointment reminders', body: 'Cuts no-shows with smart SMS + call sequences.', tag: 'SMS' },\n        { title: 'Review requests', body: 'Asks happy clients at the perfect moment.', tag: 'Growth' },\n        { title: 'Recall campaigns', body: 'Brings lapsed patients back on schedule.', tag: 'Revenue' },\n        { title: 'Lead follow-up', body: 'Responds to new inquiries within 60 seconds.', tag: 'Speed' }\n      ],\n      industries: [\n        { name: 'Med Spas', body: 'Book consults and treatments while your aestheticians stay hands-on.' },\n        { name: 'Dental Practices', body: 'Fill hygiene schedules, confirm appointments, handle insurance FAQs.' },\n        { name: 'Salons & Wellness', body: 'Take bookings after hours and rebook clients automatically.' },\n        { name: 'Home Services', body: 'Capture every emergency call and dispatch without a dispatcher.' }\n      ],\n      steps: [\n        { num: 'STEP 01', title: 'Audit', body: 'We map your call flows, booking rules, and the tools you already use.' },\n        { num: 'STEP 02', title: 'Build & train', body: 'Your voice agent learns your services, pricing, and tone — then we test it together.' },\n        { num: 'STEP 03', title: 'Launch & tune', body: 'Go live on your number. We monitor every call and keep improving it.' }\n      ]\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
